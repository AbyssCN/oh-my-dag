name: Secret scan

# gitleaks 全历史扫描 — 密钥防线自动化 (push/PR 双触发)。
# 个人账户免 GITLEAKS_LICENSE; fetch-depth 0 = 扫完整历史增量, 不只 HEAD。
on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
